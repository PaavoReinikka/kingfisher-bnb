name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  workflow_dispatch:
    inputs:
      publish_testpypi:
        description: "Build all artifacts and publish them to TestPyPI"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist
      - name: pytest
        if: ${{ matrix.target == 'x86_64' }}
        shell: bash
        run: |
          set -e
          pip install kingfisher-bnb pytest --find-links dist --force-reinstall
          pytest -q

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist
      - name: pytest
        shell: bash
        run: |
          set -e
          pip install kingfisher-bnb pytest --find-links dist --force-reinstall
          pytest -q

  # Apple Silicon (arm64) only. Intel (macos-13) is dropped: the Intel runner
  # pool queues for a long time and macOS x86_64 is increasingly legacy.
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist
      - name: pytest
        run: |
          set -e
          pip install kingfisher-bnb pytest --find-links dist --force-reinstall
          pytest -q

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # Publishing (no API tokens — uses PyPI/TestPyPI Trusted Publishing / OIDC):
  #   * TestPyPI: Actions -> CI -> "Run workflow" with publish_testpypi = true
  #   * PyPI:     push a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`
  # Requires a pending/active Trusted Publisher configured on each index for
  # this repo + workflow (see RELEASING.md).
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_testpypi) }}
    needs: [linux, windows, macos, sdist]
    permissions:
      id-token: write   # OIDC for trusted publishing
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: astral-sh/setup-uv@v5
      - name: Publish to TestPyPI
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: uv publish --trusted-publishing always --publish-url https://test.pypi.org/legacy/ dist/*
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish --trusted-publishing always dist/*
